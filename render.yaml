services:
  - type: web
    name: mentiq-backend
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    rootDir: backend
    plan: free
    region: singapore # You can change this to your preferred region (e.g., oregon, frankfurt)
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mentiq-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PYTHON_VERSION
        value: 3.11.6

databases:
  - name: mentiq-db
    databaseName: mentiq
    user: mentiq_user
    plan: free
    region: singapore
